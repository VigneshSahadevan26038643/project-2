<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Beats Player</title>
    <meta name="description" content="A premium web-based music player with deep blue neon aesthetics.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Main Player -->
        <main class="player-container glass-panel">
            <div class="album-art-container">
                <div class="glow-effect"></div>
                <img id="cover" src="" alt="Album Art" class="album-cover">
            </div>
            
            <div class="track-info">
                <h1 id="title">Song Title</h1>
                <h2 id="artist">Artist Name</h2>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" value="0" min="0" max="100" class="neon-slider">
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button id="prev" class="control-btn" aria-label="Previous">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="play" class="control-btn play-btn" aria-label="Play/Pause">
                    <!-- Play icon -->
                    <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Pause icon (hidden by default) -->
                    <svg class="pause-icon" style="display: none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="next" class="control-btn" aria-label="Next">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <div class="volume-container">
                <svg viewBox="0 0 24 24" class="volume-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" id="volume-slider" value="100" min="0" max="100" class="neon-slider">
            </div>
        </main>

        <!-- Playlist -->
        <aside class="playlist-container glass-panel">
            <h3>Queue</h3>
            <div id="playlist" class="playlist">
                <!-- Items populated via JS -->
            </div>
        </aside>
    </div>
    <audio id="audio" crossorigin="anonymous"></audio>
    <script src="script.js"></script>
</body>
</html>
